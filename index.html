<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./pop_weight_interface.html">
  <title>Codex App</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: #f3f6f8;
      color: #17202a;
    }

    main {
      width: min(520px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #d9e2ea;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 28px rgba(23, 32, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: #4b5f70;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 6px;
      background: #22313f;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>최종검사 POP - 무게 자동 I/F</h1>
    <p>앱 화면으로 이동 중입니다. 자동으로 이동하지 않으면 아래 버튼을 눌러주세요.</p>
    <a href="./pop_weight_interface.html">앱 열기</a>
  </main>
</body>
</html>
